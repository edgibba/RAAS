<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitar acesso | Serviço de Accrual</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f6f8;
            margin: 0;
            padding: 0;
            color: #1f2937;
        }

        .container {
            width: 420px;
            margin: 60px auto;
            background: #ffffff;
            padding: 32px;
            border-radius: 10px;
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.08);
        }

        h1 {
            margin-top: 0;
            font-size: 24px;
        }

        p.description {
            color: #4b5563;
            line-height: 1.5;
            margin-bottom: 24px;
        }

        label {
            display: block;
            margin-top: 14px;
            margin-bottom: 6px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
        }

        .errorlist {
            color: #b00020;
            margin: 8px 0 0 0;
            padding-left: 18px;
        }

        button {
            width: 100%;
            margin-top: 24px;
            padding: 12px;
            border: none;
            border-radius: 6px;
            background: #1f3c88;
            color: white;
            font-size: 15px;
            cursor: pointer;
        }

        .back-link {
            display: block;
            margin-top: 18px;
            text-align: center;
            color: #1f3c88;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Solicitar acesso</h1>
        <p class="description">
            Preencha os dados abaixo para enviar sua solicitação de acesso ao sistema.
            O cadastro ficará pendente até análise e liberação pelo administrador.
        </p>

        <form method="post">
            {% csrf_token %}

            {% for field in form %}
                <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                {{ field }}
                {{ field.errors }}
            {% endfor %}

            <button type="submit">Enviar solicitação</button>
        </form>

        <a href="{% url 'login' %}" class="back-link">Voltar para o login</a>
    </div>
</body>
</html>
