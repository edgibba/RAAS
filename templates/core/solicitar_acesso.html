<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitar acesso | Serviço de Accrual</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/accrual.css' %}">
</head>
<body>
    <div class="container">
        <h1>Solicitar acesso</h1>
        <p class="description">
            Preencha os dados abaixo para enviar sua solicitação de acesso ao sistema.
            O cadastro ficará pendente até análise e liberação pelo administrador.
        </p>

        <form method="post">
            {% csrf_token %}

            {% for field in form %}
                <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                {{ field }}
                {{ field.errors }}
            {% endfor %}

            <button type="submit">Enviar solicitação</button>
        </form>

        <a href="{% url 'login' %}" class="back-link">Voltar para o login</a>
    </div>
</body>
</html>
