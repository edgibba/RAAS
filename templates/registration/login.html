<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Serviço de Accrual</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f6f8;
            margin: 0;
            padding: 0;
        }

        .login-box {
            width: 360px;
            margin: 80px auto;
            background: #ffffff;
            padding: 32px;
            border-radius: 10px;
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.08);
        }

        h1 {
            margin: 0 0 24px 0;
            font-size: 22px;
        }

        label {
            display: block;
            margin-top: 14px;
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            margin-top: 20px;
            padding: 12px;
            border: none;
            border-radius: 6px;
            background: #1f3c88;
            color: white;
            font-size: 15px;
            cursor: pointer;
        }

        .error-message {
            color: #b00020;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>Acesso ao sistema</h1>

        <form method="post">
            {% csrf_token %}

            {% if form.non_field_errors %}
                <div class="error-message">
                    {{ form.non_field_errors }}
                </div>
            {% endif %}

            <label for="{{ form.username.id_for_label }}">Usuário</label>
            {{ form.username }}

            <label for="{{ form.password.id_for_label }}">Senha</label>
            {{ form.password }}

            <button type="submit">Entrar</button>
			
			<p style="margin-top: 18px; text-align: center;">
    <a href="{% url 'solicitar_acesso' %}" style="color: #1f3c88; text-decoration: none;">
        Solicitar acesso
    </a>
</p>

        </form>
    </div>
</body>
</html>
